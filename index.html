<!DOCTYPE html>
<html>
<head>
<title>Lawrence Wickham International Airport</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="airport">
        <h1>LAWRENCE WICKHAM INTERNATIONAL AIRPORT</h1>
        <h2>DEPARTURES</h2>
    </div>

    <div id="clock"></div>
</header>


<div class="board">

<table>

<thead>
<tr>
<th>AIRLINE</th>
<th>FLIGHT</th>
<th>DESTINATION</th>
<th>GATE</th>
<th>BOARDING</th>
<th>DEPARTURE</th>
<th>STATUS</th>
</tr>
</thead>

<tbody id="flights">
</tbody>

</table>

</div>


<footer>
    <span>Welcome to Lawrence Wickham International Airport. Do not leave luggage unattended. Thank you!</span>
</footer>


<script src="script.js"></script>

</body>
</html>
